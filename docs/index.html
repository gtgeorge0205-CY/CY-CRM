<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>新晴揚 CRM 測試版</title>
<link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="新晴揚CRM">
<meta name="theme-color" content="#0f172a">

<style>
:root{
  --app-h:100svh;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  overflow-x:hidden;
  background:#f4f6fb;
  color:#111827;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

button,
input,
textarea{
  font:inherit;
}

input,
textarea{
  font-size:20px;
}

button{
  border:none;
  touch-action:manipulation;
}

#app{
  position:fixed;
  inset:0;
  width:100%;
  height:var(--app-h);
  overflow:hidden;
  overflow-x:hidden;
  background:#f4f6fb;
}

.view{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  background:#f4f6fb;
}

.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:#ffffff;
  padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
  border-bottom:1px solid #e5e7eb;
}

.title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.menu-icon{
  flex:0 0 auto;
  color:#2f80ed;
  font-size:30px;
  font-weight:900;
}

.title{
  flex:1;
  min-width:0;
  text-align:right;
  font-size:28px;
  line-height:1.15;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.search-wrap{
  position:relative;
  margin-top:12px;
}

.search{
  width:100%;
  border:2px solid #bfdbfe;
  border-radius:18px;
  padding:15px 48px 15px 16px;
  background:#ffffff;
  outline:none;
  font-weight:800;
}

.clear-btn{
  position:absolute;
  right:10px;
  top:10px;
  width:34px;
  height:34px;
  border-radius:999px;
  background:#e5e7eb;
  color:#4b5563;
  font-size:22px;
  font-weight:900;
  display:none;
}

.result-count{
  padding:12px 14px 4px;
  color:#6b7280;
  font-size:20px;
  font-weight:900;
}

.list{
  padding:8px 12px calc(120px + env(safe-area-inset-bottom));
}

.card{
  width:100%;
  margin-bottom:11px;
  padding:14px;
  border-radius:20px;
  background:#ffffff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  overflow:hidden;
}

.card-main{
  display:grid;
  grid-template-columns:58px minmax(0,1fr) auto;
  gap:12px;
  align-items:center;
}

.avatar{
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ffffff;
  font-size:27px;
  font-weight:900;
}

.blue{background:#2f80ed}
.green{background:#27ae60}
.orange{background:#f2994a}
.purple{background:#7b61ff}
.red{background:#eb5757}
.teal{background:#00a99d}

.info{
  min-width:0;
  overflow:hidden;
}

.name{
  font-size:29px;
  line-height:1.12;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.meta{
  margin-top:5px;
  color:#4b5563;
  font-size:19px;
  line-height:1.25;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:15px;
  font-weight:900;
  white-space:nowrap;
}

.badge-red{background:#ffe5e5;color:#c62828}
.badge-green{background:#dcfce7;color:#15803d}
.badge-orange{background:#fff3d7;color:#b45309}
.badge-gray{background:#e5e7eb;color:#374151}

.empty{
  padding:60px 20px;
  text-align:center;
  color:#777777;
  font-size:22px;
}

#locationView{
  display:none;
  z-index:35;
}

.location-content{
  padding:12px 12px calc(130px + env(safe-area-inset-bottom));
}

.location-card{
  margin-bottom:14px;
  padding:16px;
  border-radius:22px;
  background:#ffffff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  overflow:hidden;
}

.location-title{
  color:#374151;
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.location-results{
  margin-top:10px;
}

.location-result{
  width:100%;
  margin-bottom:9px;
  padding:13px;
  border-radius:16px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  text-align:left;
}

.location-result-name{
  font-size:22px;
  font-weight:900;
  color:#111827;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.location-result-meta,
.location-selected-row,
.location-position-row{
  margin-top:5px;
  color:#4b5563;
  font-size:18px;
  font-weight:800;
  line-height:1.35;
  word-break:break-word;
}

.location-selected-box,
.location-position-box{
  padding:13px;
  border-radius:16px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
}

.location-note{
  width:100%;
  min-height:130px;
  resize:vertical;
  border:2px solid #bfdbfe;
  border-radius:18px;
  padding:14px;
  outline:none;
  background:#ffffff;
  font-weight:800;
  line-height:1.35;
}

.location-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.location-btn{
  min-height:58px;
  border-radius:18px;
  color:#ffffff;
  font-size:21px;
  font-weight:900;
}

.location-btn.gps{background:#2f80ed}
.location-btn.save{background:#16a34a}
.location-btn:disabled{
  background:#9ca3af;
  color:#f3f4f6;
}

.location-message{
  display:none;
  margin-top:10px;
  padding:12px;
  border-radius:14px;
  font-size:18px;
  font-weight:900;
  line-height:1.45;
  white-space:pre-line;
}

.location-message.show{display:block}
.location-message.ok{background:#dcfce7;color:#15803d}
.location-message.error{background:#ffe5e5;color:#c62828}
.location-message.info{background:#e0f2fe;color:#075985}

#detailView{
  display:none;
  z-index:40;
}

.detail-top{
  position:sticky;
  top:0;
  z-index:30;
  display:flex;
  align-items:center;
  gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  background:#f4f6fb;
}

.back-btn{
  padding:12px 16px;
  border-radius:16px;
  background:#ffffff;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  font-size:22px;
  font-weight:900;
}

.detail-title{
  color:#374151;
  font-size:25px;
  font-weight:900;
}

.detail-content{
  padding:0 12px calc(220px + env(safe-area-inset-bottom));
}

#detailView.input-mode .detail-content{
  padding-bottom:calc(360px + env(safe-area-inset-bottom));
}

.customer-head,
.section{
  margin-bottom:14px;
  padding:16px;
  border-radius:22px;
  background:#ffffff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  overflow:hidden;
}

.customer-head{
  display:grid;
  grid-template-columns:68px minmax(0,1fr);
  gap:14px;
  align-items:center;
}

#detailView.input-mode .customer-head{
  max-height:0;
  margin-bottom:8px;
  padding-top:0;
  padding-bottom:0;
  opacity:0;
  pointer-events:none;
  box-shadow:none;
}

.detail-avatar{
  width:68px;
  height:68px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#2f80ed;
  color:#ffffff;
  font-size:32px;
  font-weight:900;
}

.detail-name{
  font-size:34px;
  line-height:1.12;
  font-weight:900;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.detail-meta{
  margin-top:6px;
  color:#4b5563;
  font-size:21px;
  line-height:1.35;
}

.detail-badge-wrap{
  margin-top:10px;
}

.section-title{
  margin-bottom:12px;
  font-size:26px;
  font-weight:900;
}

.report-section{
  border:2px solid #bfdbfe;
  background:#eff6ff;
}

#detailView.input-mode .report-section{
  border-color:#2f80ed;
  box-shadow:0 4px 18px rgba(47,128,237,.18);
  margin-top:0;
}

.report-grid,
.action-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.report-choice{
  width:100%;
  min-height:62px;
  padding:12px 8px;
  border-radius:16px;
  background:#ffffff;
  color:#1e88e5;
  font-size:22px;
  font-weight:900;
}

.report-choice.selected{
  background:#2f80ed;
  color:#ffffff;
}

.report-note-area{
  display:none;
  margin-top:12px;
}

.report-note-area.show{
  display:block;
}

.note-label{
  font-size:21px;
  font-weight:900;
  color:#374151;
}

textarea{
  width:100%;
  min-height:130px;
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:16px;
  outline:none;
  resize:none;
  background:#ffffff;
}

#detailView.input-mode textarea{
  min-height:130px;
}

.send{
  width:100%;
  margin-top:10px;
  padding:17px;
  border-radius:16px;
  background:#2f80ed;
  color:#ffffff;
  font-size:26px;
  font-weight:900;
}

.send:disabled{
  opacity:.65;
}

.action-title{
  margin-bottom:10px;
  font-size:22px;
  font-weight:900;
}

.action-btn{
  width:100%;
  min-height:66px;
  padding:14px 8px;
  border-radius:18px;
  font-size:23px;
  font-weight:900;
}

.phone{background:#dcfce7;color:#166534}
.history{background:#ede9fe;color:#5b21b6}
.nav{background:#f3f4f6;color:#374151}
.photo{background:#f3f4f6;color:#374151}

.panel{
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:16px;
  background:#f8fafc;
  overflow:hidden;
}

.phone-link{
  display:block;
  width:100%;
  margin-bottom:9px;
  padding:16px;
  border-radius:16px;
  background:#2f80ed;
  color:#ffffff;
  text-align:center;
  text-decoration:none;
  font-size:25px;
  font-weight:900;
}

.hist-item{
  padding:10px 0;
  border-bottom:1px solid #e5e7eb;
  font-size:18px;
  line-height:1.45;
}

.hist-time{
  margin-bottom:3px;
  color:#2563eb;
  font-weight:900;
}

.close-bottom{
  width:100%;
  margin-top:4px;
  padding:17px;
  border-radius:18px;
  background:#ffffff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  font-size:24px;
  font-weight:900;
}
</style>
</head>

<body>
<div id="app">
  <div class="view" id="homeView">
    <div class="topbar">
      <div class="title-row">
        <div class="menu-icon">☰</div>
        <div class="title" id="pageTitle">客戶列表｜老闆版</div>
      </div>

      <div class="search-wrap">
        <input class="search" id="search" placeholder="搜尋客戶名稱 / 電話 / 專案">
        <button class="clear-btn" id="clearBtn" onclick="clearSearch()">×</button>
      </div>
    </div>

    <div class="result-count" id="resultCount">真實資料載入中...</div>
    <div class="list" id="list">
      <div class="empty">真實資料載入中...</div>
    </div>
  </div>

  <div class="view" id="locationView">
    <div class="detail-top">
      <button class="back-btn" onclick="closeLocationMode()">‹ 返回</button>
      <div class="detail-title">新晴揚｜客戶定位模式</div>
    </div>

    <div class="location-content">
      <div class="location-card">
        <div class="location-title">搜尋客戶</div>
        <div class="search-wrap">
          <input class="search" id="locationSearch" placeholder="搜尋客戶名稱 / 電話 / 代號">
          <button class="clear-btn" id="locationClearBtn" onclick="clearLocationSearch()">×</button>
        </div>
        <div class="location-results" id="locationResults">
          <div class="empty">輸入關鍵字搜尋客戶</div>
        </div>
      </div>

      <div class="location-card">
        <div class="location-title">選定客戶資訊</div>
        <div class="location-selected-box" id="locationSelectedBox">
          <div class="location-selected-row">尚未選定客戶</div>
        </div>
      </div>

      <div class="location-card">
        <div class="location-title">目前位置</div>
        <div class="location-position-box" id="locationPositionBox">
          <div class="location-position-row">緯度：尚未取得</div>
          <div class="location-position-row">經度：尚未取得</div>
          <div class="location-position-row">精準度：尚未取得</div>
        </div>
      </div>

      <div class="location-card">
        <div class="location-title">定位備註</div>
        <textarea class="location-note" id="locationNote" placeholder="例如：店門口 / 巷口 / Google地址偏掉 / 同排店家"></textarea>
      </div>

      <div class="location-card">
        <div class="location-actions">
          <button class="location-btn gps" id="getLocationBtn" onclick="getCurrentLocation()">取得目前位置</button>
          <button class="location-btn save" id="saveLocationBtn" onclick="saveCustomerLocation()">儲存定位</button>
        </div>
        <div class="location-message info show" id="locationMessage">請先搜尋並選定客戶。</div>
      </div>
    </div>
  </div>

  <div class="view" id="detailView">
    <div class="detail-top">
      <button class="back-btn" onclick="closeDetail()">‹ 返回</button>
      <div class="detail-title">客戶動作</div>
    </div>

    <div class="detail-content">
      <div class="customer-head">
        <div class="detail-avatar" id="detailAvatar">客</div>
        <div>
          <div class="detail-name" id="detailName">客戶名稱</div>
          <div class="detail-meta" id="detailMeta">狀態</div>
          <div class="detail-badge-wrap">
            <span class="badge badge-red" id="detailBadge">未回報</span>
          </div>
        </div>
      </div>

      <div class="section report-section">
        <div class="section-title">📝 拜訪回報</div>
        <div class="report-grid">
          <button class="report-choice" onclick="pickStatus(this,'✅ 成交')">✅ 成交</button>
          <button class="report-choice" onclick="pickStatus(this,'🔥 機會')">🔥 機會</button>
          <button class="report-choice" onclick="pickStatus(this,'📌 追蹤')">📌 追蹤</button>
          <button class="report-choice" onclick="pickStatus(this,'💰 收款')">💰 收款</button>
          <button class="report-choice" onclick="pickStatus(this,'⚠️ 異常')">⚠️ 異常</button>
          <button class="report-choice" onclick="pickStatus(this,'☎️ 電訪 / 沒遇到')">☎️ 電訪 / 沒遇到</button>
        </div>
        <div class="report-note-area" id="reportNoteArea">
          <div class="note-label">補充說明</div>
          <textarea id="reportNote" placeholder="例如：AGM有機會、VARTA被問價、下週再追"></textarea>
          <button class="send" id="sendReportBtn" onclick="submitReport()">送出回報</button>
        </div>
      </div>

      <div class="section">
        <div class="action-title">聯絡與紀錄</div>
        <div class="action-grid">
          <button class="action-btn phone" onclick="togglePhonePanel()">📞 電話</button>
          <button class="action-btn history" onclick="toggleHistoryPanel()">📜 歷史</button>
        </div>
        <div class="panel" id="phonePanel"></div>
        <div class="panel" id="historyPanel"></div>
      </div>

      <div class="section">
        <div class="action-title">其他功能</div>
        <div class="action-grid">
          <button class="action-btn nav" onclick="openMap()">🧭 導航</button>
          <button class="action-btn photo" onclick="alert('照片功能下一版')">📷 照片</button>
        </div>
      </div>

      <button class="close-bottom" onclick="closeDetail()">關閉</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://script.google.com/macros/s/AKfycbyIFfeLQBG_7iBhN4gNA5QWXa1aLHczrlxWF_24gcanlL_XOvYo_nudFFSaLzJFJsnSrQ/exec';
const API_TOKEN = 'CYCRM_2026_write_test';
const MODE_STORAGE_KEY = 'crm_mode';
const JSONP_TIMEOUT_MS = 20000;
const GET_CUSTOMERS_RETRY_DELAY_MS = 1000;

const fallbackCustomers=[
  {

    history:[

      {time:'2026/05/18 11:10',status:'📌 追蹤',note:'詢問 VARTA 報價'}
    ]
  },
  {
    customerCode:'A002',
    customerName:'宏達輪胎電機',
    region:'溪北',
    owner:'溪北',
    phone:'06-635-8899',

    lastNote:'',
    history:[
      {time:'2026/05/10 15:20',status:'🔥 機會',note:'老闆說月底可能叫貨'}

  },
  {
    customerCode:'A003',
    customerName:'佳里順發保修廠',

    history:[

  }
];

let customers=[];
let viewCustomers=[];
let currentCustomer=null;
let selectedStatus='';
let isSubmittingReport=false;
let inputModeLeaveTimer=null;
let inputModeScrollTimer=null;
let inputModeSecondScrollTimer=null;
let isReportSubmitTap=false;
let locationCandidates=[];
let selectedLocationCustomer=null;
let currentLocationData=null;
let isSavingLocation=false;

const searchInput=document.getElementById('search');
const clearBtn=document.getElementById('clearBtn');
const reportNoteArea=document.getElementById('reportNoteArea');
const reportNote=document.getElementById('reportNote');
const sendReportBtn=document.getElementById('sendReportBtn');
const locationSearchInput=document.getElementById('locationSearch');
const locationClearBtn=document.getElementById('locationClearBtn');
const locationResults=document.getElementById('locationResults');
const locationSelectedBox=document.getElementById('locationSelectedBox');
const locationPositionBox=document.getElementById('locationPositionBox');
const locationNote=document.getElementById('locationNote');
const getLocationBtn=document.getElementById('getLocationBtn');
const saveLocationBtn=document.getElementById('saveLocationBtn');
const locationMessage=document.getElementById('locationMessage');

syncViewport();
window.addEventListener('resize',syncViewport);

if(window.visualViewport){
  window.visualViewport.addEventListener('resize',syncViewport);
}

updatePageTitle();
loadRealCustomers();
initLocationModeFromUrl();

searchInput.addEventListener('focus',syncViewport);

searchInput.addEventListener('input',function(){
  const key=this.value.trim();
  clearBtn.style.display=key ? 'block' : 'none';

  render(customers.filter(function(c){
    return getSearchText(c).includes(key);
  }));

  syncViewport();
});

searchInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    this.blur();
    syncViewport();
  }
});

if(locationSearchInput){
  locationSearchInput.addEventListener('input',function(){
    locationClearBtn.style.display=this.value.trim() ? 'block' : 'none';
    renderLocationResults();
  });

  locationSearchInput.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      this.blur();
      syncViewport();
    }
  });
}

reportNote.addEventListener('focus',enterInputMode);
reportNote.addEventListener('blur',leaveInputMode);
reportNote.addEventListener('input',function(){
  scheduleReportNoteScroll(false);
});

sendReportBtn.addEventListener('touchstart',markReportSubmitTap);
sendReportBtn.addEventListener('mousedown',markReportSubmitTap);

function syncViewport(){
  let h=window.innerHeight;

  if(window.visualViewport && window.visualViewport.height){
    h=window.visualViewport.height;
  }

  document.documentElement.style.setProperty('--app-h',Math.floor(h)+'px');
  document.documentElement.scrollLeft=0;
  document.body.scrollLeft=0;

  const app=document.getElementById('app');
  const home=document.getElementById('homeView');
  const detail=document.getElementById('detailView');
  const location=document.getElementById('locationView');

  if(app) app.scrollLeft=0;
  if(home) home.scrollLeft=0;
  if(detail) detail.scrollLeft=0;
  if(location) location.scrollLeft=0;
}

function enterInputMode(){
  const detail=document.getElementById('detailView');

  if(inputModeLeaveTimer){
    clearTimeout(inputModeLeaveTimer);
    inputModeLeaveTimer=null;
  }

  if(detail){
    detail.classList.add('input-mode');
  }

  scheduleReportNoteScroll(true);
}

function leaveInputMode(){
  if(inputModeLeaveTimer){
    clearTimeout(inputModeLeaveTimer);
  }

  inputModeLeaveTimer=setTimeout(function(){
    if(isReportSubmitTap || document.activeElement===reportNote){
      return;
    }

    const detail=document.getElementById('detailView');

    if(detail){
      detail.classList.remove('input-mode');
    }
  },300);
}

function scheduleReportNoteScroll(includeSecondPass){
  if(inputModeScrollTimer){
    clearTimeout(inputModeScrollTimer);
  }

  if(inputModeSecondScrollTimer){
    clearTimeout(inputModeSecondScrollTimer);
  }

  inputModeScrollTimer=setTimeout(scrollReportNoteIntoView,300);

  if(includeSecondPass){
    inputModeSecondScrollTimer=setTimeout(scrollReportNoteIntoView,700);
  }
}

function scheduleReportNoteAreaScroll(){
  if(inputModeScrollTimer){
    clearTimeout(inputModeScrollTimer);
  }

  if(inputModeSecondScrollTimer){
    clearTimeout(inputModeSecondScrollTimer);
  }

  inputModeScrollTimer=setTimeout(scrollReportNoteAreaIntoView,100);
  inputModeSecondScrollTimer=setTimeout(scrollReportNoteAreaIntoView,400);
}

function scrollReportNoteIntoView(){
  reportNote.scrollIntoView({
    block:'center',
    behavior:'smooth'
  });
}

function scrollReportNoteAreaIntoView(){
  reportNoteArea.scrollIntoView({
    block:'center',
    behavior:'smooth'
  });
}

function markReportSubmitTap(){
  isReportSubmitTap=true;

  setTimeout(function(){
    isReportSubmitTap=false;

    if(document.activeElement!==reportNote){
      leaveInputMode();
    }
  },900);
}

function clearSearch(){
  searchInput.value='';
  clearBtn.style.display='none';
  render(customers);
  searchInput.blur();
  syncViewport();
}

function initLocationModeFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const tool=String(params.get('tool')||params.get('view')||'').trim().toLowerCase();

  if(tool==='location' || tool==='location_test'){
    openLocationMode();
  }
}

function openLocationMode(){
  document.getElementById('homeView').style.display='none';
  document.getElementById('detailView').style.display='none';
  document.getElementById('locationView').style.display='block';
  resetLocationForm();
  renderLocationResults();
  syncViewport();
}

function closeLocationMode(){
  document.getElementById('locationView').style.display='none';
  document.getElementById('homeView').style.display='block';
  syncViewport();
}

function resetLocationForm(){
  locationCandidates=[];
  selectedLocationCustomer=null;
  currentLocationData=null;
  isSavingLocation=false;

  if(locationSearchInput){
    locationSearchInput.value='';
  }

  if(locationClearBtn){
    locationClearBtn.style.display='none';
  }

  if(locationNote){
    locationNote.value='';
  }

  setLocationButtonLoading(false);
  setLocationSaveLoading(false);
  renderSelectedLocationCustomer();
  renderLocationPosition();
  setLocationMessage('請先搜尋並選定客戶。','info');
}

function clearLocationSearch(){
  locationSearchInput.value='';
  locationClearBtn.style.display='none';
  renderLocationResults();
  locationSearchInput.blur();
  syncViewport();
}

function renderLocationResults(){
  if(!locationResults || !locationSearchInput){
    return;
  }

  const key=locationSearchInput.value.trim();

  if(!key){
    locationCandidates=[];
    locationResults.innerHTML='<div class="empty">輸入關鍵字搜尋客戶</div>';
    return;
  }

  if(!customers.length){
    locationCandidates=[];
    locationResults.innerHTML='<div class="empty">客戶資料尚未載入</div>';
    return;
  }

  locationCandidates=customers.filter(function(c){
    return getSearchText(c).includes(key);
  }).slice(0,20);

  if(!locationCandidates.length){
    locationResults.innerHTML='<div class="empty">找不到符合的客戶</div>';
    return;
  }

  locationResults.innerHTML=locationCandidates.map(function(c,i){
    return `
      <button class="location-result" onclick="selectLocationCustomer(${i})">
        <div class="location-result-name">${escapeHtml(c.customerName||'')}</div>
        <div class="location-result-meta">
          ${escapeHtml(c.customerCode||'未填代號')}｜${escapeHtml(c.region||c.owner||'')}
        </div>
      </button>
    `;
  }).join('');
}

function selectLocationCustomer(index){
  selectedLocationCustomer=locationCandidates[index]||null;
  renderSelectedLocationCustomer();

  if(selectedLocationCustomer){
    setLocationMessage('已選定客戶，可以取得目前位置。','info');
  }

  const positionCard=document.getElementById('locationPositionBox');

  if(positionCard){
    positionCard.scrollIntoView({
      block:'center',
      behavior:'smooth'
    });
  }
}

function renderSelectedLocationCustomer(){
  if(!locationSelectedBox){
    return;
  }

  if(!selectedLocationCustomer){
    locationSelectedBox.innerHTML='<div class="location-selected-row">尚未選定客戶</div>';
    return;
  }

  locationSelectedBox.innerHTML=
    '<div class="location-selected-row">客戶代號：'+
    escapeHtml(selectedLocationCustomer.customerCode||'未填')+
    '</div>'+
    '<div class="location-selected-row">客戶名稱：'+
    escapeHtml(selectedLocationCustomer.customerName||'')+
    '</div>';
}

function getCurrentLocation(){
  if(!navigator.geolocation){
    setLocationMessage('這個瀏覽器不支援定位功能。','error');
    return;
  }

  setLocationButtonLoading(true);
  setLocationMessage('正在取得目前位置...','info');

  navigator.geolocation.getCurrentPosition(function(position){
    currentLocationData={
      latitude:position.coords.latitude,
      longitude:position.coords.longitude,
      accuracy:position.coords.accuracy
    };

    renderLocationPosition();
    setLocationButtonLoading(false);
    setLocationMessage('已取得目前位置。','ok');
  },function(err){
    setLocationButtonLoading(false);
    setLocationMessage(getLocationErrorMessage(err),'error');
  },{
    enableHighAccuracy:true,
    timeout:15000,
    maximumAge:0
  });
}

function renderLocationPosition(){
  if(!locationPositionBox){
    return;
  }

  if(!currentLocationData){
    locationPositionBox.innerHTML=
      '<div class="location-position-row">緯度：尚未取得</div>'+
      '<div class="location-position-row">經度：尚未取得</div>'+
      '<div class="location-position-row">精準度：尚未取得</div>';
    return;
  }

  locationPositionBox.innerHTML=
    '<div class="location-position-row">緯度：'+
    escapeHtml(formatCoordinate(currentLocationData.latitude))+
    '</div>'+
    '<div class="location-position-row">經度：'+
    escapeHtml(formatCoordinate(currentLocationData.longitude))+
    '</div>'+
    '<div class="location-position-row">精準度：'+
    escapeHtml(formatAccuracy(currentLocationData.accuracy))+
    ' 公尺</div>';
}

function saveCustomerLocation(){
  if(isSavingLocation){
    return;
  }

  if(!selectedLocationCustomer){
    setLocationMessage('請先選定客戶，才能儲存定位。','error');
    return;
  }

  if(!currentLocationData){
    setLocationMessage('請先取得目前位置，才能儲存定位。','error');
    return;
  }

  if(!isWriteApiConfigured()){
    setLocationMessage('Apps Script API 或 token 尚未設定，無法儲存定位。','error');
    return;
  }

  const note=locationNote ? locationNote.value.trim() : '';

  setLocationSaveLoading(true);
  setLocationMessage('正在儲存定位...','info');

  const payload={
    personnel:getLocationPersonnel(),
    mode:getMode(),
    owner:selectedLocationCustomer.owner||'',
    region:selectedLocationCustomer.region||'',
    customerCode:selectedLocationCustomer.customerCode||'',
    customerName:selectedLocationCustomer.customerName||'',
    latitude:currentLocationData.latitude,
    longitude:currentLocationData.longitude,
    accuracy:currentLocationData.accuracy,
    note:note
  };

  jsonp({
    action:'saveCustomerLocationTest',
    token:API_TOKEN,
    payload:JSON.stringify(payload)
  }).then(function(res){
    const accuracyText=formatAccuracy(currentLocationData.accuracy);
    const message='儲存成功：\n客戶：'+
      (selectedLocationCustomer.customerName||'')+
      '\n精準度：'+accuracyText+' 公尺';

    setLocationSaveLoading(false);
    setLocationMessage(message,'ok');
    alert(message);
  }).catch(function(err){
    setLocationSaveLoading(false);
    setLocationMessage('儲存定位失敗：'+err.message,'error');
  });
}

function setLocationButtonLoading(isLoading){
  if(!getLocationBtn){
    return;
  }

  getLocationBtn.disabled=isLoading;
  getLocationBtn.innerText=isLoading ? '定位中...' : '取得目前位置';
}

function setLocationSaveLoading(isLoading){
  isSavingLocation=isLoading;

  if(!saveLocationBtn){
    return;
  }

  saveLocationBtn.disabled=isLoading;
  saveLocationBtn.innerText=isLoading ? '儲存中...' : '儲存定位';
}

function setLocationMessage(text,type){
  if(!locationMessage){
    return;
  }

  locationMessage.innerText=text||'';
  locationMessage.className='location-message show '+(type||'info');
}

function getLocationErrorMessage(err){
  if(err && err.code===1){
    return '無法取得定位：你拒絕了定位權限。請允許定位後再試一次。';
  }

  if(err && err.code===2){
    return '無法取得定位：目前位置訊號不穩，請到店門口或較空曠處再試。';
  }

  if(err && err.code===3){
    return '無法取得定位：定位逾時，請再按一次取得目前位置。';
  }

  return '無法取得定位，請確認手機定位功能已開啟。';
}

function getLocationPersonnel(){
  const mode=getMode();

  if(mode==='south'){
    return '溪南';
  }

  if(mode==='north'){
    return '溪北';
  }

  if(mode==='boss'){
    return '老闆版';
  }

  return '未指定';
}

function formatCoordinate(value){
  const n=Number(value);

  if(!isFinite(n)){
    return '';
  }

  return n.toFixed(6);
}

function formatAccuracy(value){
  const n=Number(value);

  if(!isFinite(n)){
    return '';
  }

  return Math.round(n).toString();
}

function loadRealCustomers(){
  const mode=getMode();

  loadRealCustomersAttempt(mode,1);
}

function loadRealCustomersAttempt(mode,attempt){
  if(attempt===1){
    console.log('getCustomers attempt 1 start');
  }else{
    console.log('getCustomers retry start');
  }

  jsonp({
    action:'getCustomers',
    mode:mode
  }).then(function(data){
    if(attempt>1){
      console.log('getCustomers retry success');
    }

    customers=(data||[]).map(normalizeCustomer).sort(compareCustomers);
    applySearch();
    renderLocationResults();
    resetLocationMessageAfterCustomersLoaded();
    syncViewport();
  }).catch(function(err){
    if(attempt===1){
      console.log('getCustomers attempt 1 failed / timeout',err.message);
      showCustomersRetryMessage();

      setTimeout(function(){
        loadRealCustomersAttempt(mode,2);
      },GET_CUSTOMERS_RETRY_DELAY_MS);

      return;
    }

    console.log('getCustomers retry failed',err.message);
    showCustomersLoadError(err);
  });
}

function resetLocationMessageAfterCustomersLoaded(){
  const locationView=document.getElementById('locationView');

  if(!locationView || locationView.style.display!=='block' || selectedLocationCustomer){
    return;
  }

  setLocationMessage('請先搜尋並選定客戶。','info');
}

function showCustomersRetryMessage(){
  document.getElementById('resultCount').innerText='資料載入較慢，正在重試一次...';
  document.getElementById('list').innerHTML=
    '<div class="empty">資料載入較慢，正在重試一次...</div>';
  setLocationMessage('資料載入較慢，正在重試一次...','info');
  syncViewport();
}

function showCustomersLoadError(err){
  customers=[];
  viewCustomers=[];
  document.getElementById('resultCount').innerText='資料載入失敗';
  document.getElementById('list').innerHTML=
    '<div class="empty" style="color:#c62828">資料載入失敗<br>'+
    escapeHtml(err.message)+
    '</div>';
  setLocationMessage('資料載入失敗：'+err.message,'error');
  renderLocationResults();
  syncViewport();
}

function jsonp(params,options){
  return new Promise(function(resolve,reject){
    if(!API_BASE || API_BASE==='請貼上AppsScriptExec網址'){
      reject(new Error('尚未設定 Apps Script API 網址'));
      return;
    }

    const timeoutMs=(options && options.timeoutMs) || JSONP_TIMEOUT_MS;
    const callbackName='jsonp_cb_'+Date.now()+'_'+Math.floor(Math.random()*100000);
    const script=document.createElement('script');
    let timer=null;

    window[callbackName]=function(res){
      cleanup();

      if(res && res.ok){
        resolve(res.data);
      }else{
        reject(new Error(res && res.error ? res.error : 'API 回傳失敗'));
      }
    };

    function cleanup(){
      if(timer){
        clearTimeout(timer);
      }

      delete window[callbackName];

      if(script.parentNode){
        script.parentNode.removeChild(script);
      }
    }

    const query=new URLSearchParams();

    Object.keys(params||{}).forEach(function(key){
      query.set(key,params[key]);
    });

    query.set('callback',callbackName);

    script.src=API_BASE+'?'+query.toString();
    script.onerror=function(){
      cleanup();
      reject(new Error('API 載入失敗'));
    };

    timer=setTimeout(function(){
      cleanup();
      reject(new Error('API 逾時'));
    },timeoutMs);

    document.body.appendChild(script);
  });
}

function getMode(){
  const params=new URLSearchParams(window.location.search);
  const urlMode=normalizeMode(params.get('mode'));

  if(urlMode){
    rememberMode(urlMode);
    return urlMode;
  }

  const storedMode=normalizeMode(readStoredMode(MODE_STORAGE_KEY)) ||
                   normalizeMode(readStoredMode('mode'));

  if(storedMode){
    rememberMode(storedMode);
    return storedMode;
  }

  rememberMode('south');
  return 'south';
}

function normalizeMode(mode){
  const value=String(mode||'').trim().toLowerCase();

  if(value==='south' || value==='north' || value==='boss'){
    return value;
  }

  return '';
}

function rememberMode(mode){
  const safeMode=normalizeMode(mode);

  if(!safeMode){
    return;
  }

  try{
    localStorage.setItem(MODE_STORAGE_KEY,safeMode);
    localStorage.setItem('mode',safeMode);
  }catch(err){}
}

function readStoredMode(key){
  try{
    return localStorage.getItem(key)||'';
  }catch(err){
    return '';
  }
}

function updatePageTitle(){
  const mode=getMode();
  const title=document.getElementById('pageTitle');

  if(!title){
    return;
  }

  if(mode==='north'){
    title.innerText='客戶列表｜溪北';
    return;
  }

  if(mode==='south'){
    title.innerText='客戶列表｜溪南';
    return;
  }

  title.innerText='客戶列表｜老闆版';
}

function applySearch(){
  const key=searchInput.value.trim();

  clearBtn.style.display=key ? 'block' : 'none';

  if(!key){
    render(customers);
    return;
  }

  render(customers.filter(function(c){
    return getSearchText(c).includes(key);
  }));
}

function normalizeCustomer(c){
  c=c||{};
  c.history=Array.isArray(c.history) ? c.history : [];
  return c;
}

function compareCustomers(a,b){
  const pa=getCustomerSortPriority(a);
  const pb=getCustomerSortPriority(b);

  if(pa!==pb){
    return pa-pb;
  }

  return getCustomerSortKey(a).localeCompare(
    getCustomerSortKey(b),
    'zh-Hant',
    {numeric:true}
  );
}

function getCustomerSortPriority(c){
  if(hasValue(c.lastStatus)){
    return 0;
  }

  if(!hasValue(c.lastVisit)){
    return 3;
  }

  const days=getValidDays(c.days);

  if(days!==null && days>=8){
    return 1;
  }

  return 2;
}

function getCustomerSortKey(c){
  if(hasValue(c.customerCode)){
    return String(c.customerCode).trim();
  }

  return String(c.customerName||'').trim();
}

function render(data){
  viewCustomers=data||[];
  document.getElementById('resultCount').innerText='搜尋結果（'+viewCustomers.length+'）';

  const list=document.getElementById('list');

  if(!viewCustomers.length){
    list.innerHTML='<div class="empty">找不到客戶</div>';
    return;
  }

  list.innerHTML=viewCustomers.map(function(c,i){
    const color=['blue','green','orange','purple','teal','red'][i%6];
    const word=(c.customerName||'?').substring(0,1);
    const badge=getBadge(c);

    return `
      <div class="card" onclick="openDetail(${i})">
        <div class="card-main">
          <div class="avatar ${color}">${escapeHtml(word)}</div>
          <div class="info">
            <div class="name">${escapeHtml(c.customerName)}</div>
            <div class="meta">${escapeHtml(getSubText(c))}</div>
          </div>
          <span class="badge ${badge.cls}">${badge.text}</span>
        </div>
      </div>
    `;
  }).join('');
}

function openDetail(i){
  if(document.activeElement){
    document.activeElement.blur();
  }

  currentCustomer=viewCustomers[i];
  selectedStatus='';

  if(!currentCustomer){
    return;
  }

  document.querySelectorAll('.report-choice').forEach(function(b){
    b.classList.remove('selected');
  });

  document.getElementById('reportNote').value='';
  hideReportNoteArea();
  resetReportButton();
  document.getElementById('detailView').classList.remove('input-mode');
  renderDetail();

  document.getElementById('homeView').style.display='none';
  document.getElementById('detailView').style.display='block';
  document.getElementById('detailView').scrollTop=0;
  syncViewport();
}

function closeDetail(){
  document.getElementById('detailView').style.display='none';
  document.getElementById('detailView').classList.remove('input-mode');
  document.getElementById('homeView').style.display='block';
  syncViewport();
}

function renderDetail(){
  const c=currentCustomer;
  const badge=getBadge(c);

  document.getElementById('detailAvatar').innerText=(c.customerName||'?').substring(0,1);
  document.getElementById('detailName').innerText=c.customerName||'';
  document.getElementById('detailMeta').innerText=getSubText(c);

  const b=document.getElementById('detailBadge');
  b.innerText=badge.text;
  b.className='badge '+badge.cls;

  document.getElementById('phonePanel').style.display='none';
  document.getElementById('historyPanel').style.display='none';
  document.getElementById('phonePanel').innerHTML='';
  document.getElementById('historyPanel').innerHTML='';
}

function getSubText(c){
  const lastStatus=hasValue(c.lastStatus) ? String(c.lastStatus).trim() : '';
  const lastVisit=hasValue(c.lastVisit) ? String(c.lastVisit).trim() : '';

  if(lastStatus){
    return lastStatus+'｜'+(lastVisit||'無日期');
  }

  if(!lastVisit){
    return '尚無拜訪紀錄';
  }

  const days=getValidDays(c.days);

  if(days!==null && days>0){
    return days+'天未拜訪';
  }

  if(days===0){
    return '今日已拜訪';
  }

  return '最後拜訪｜'+lastVisit;
}

function getBadge(c){
  if(hasValue(c.lastStatus)){
    return {text:'已回報',cls:'badge-green'};
  }

  if(!hasValue(c.lastVisit)){
    return {text:'未回報',cls:'badge-red'};
  }

  const days=getValidDays(c.days);

  if(days!==null && days>=15){
    return {text:'久未拜訪',cls:'badge-gray'};
  }

  if(days!==null && days>=8){
    return {text:'待追蹤',cls:'badge-orange'};
  }

  return {text:'未回報',cls:'badge-red'};
}

function hasValue(value){
  return value!==null &&
         value!==undefined &&
         String(value).trim()!=='';
}

function getValidDays(value){
  if(!hasValue(value)){
    return null;
  }

  const days=Number(String(value).trim());

  return isFinite(days) ? days : null;
}

function pickStatus(btn,status){
  selectedStatus=status;

  document.querySelectorAll('.report-choice').forEach(function(b){
    b.classList.remove('selected');
  });

  btn.classList.add('selected');
  showReportNoteArea();
}

function showReportNoteArea(){
  const detail=document.getElementById('detailView');

  reportNoteArea.classList.add('show');

  if(detail){
    detail.classList.add('input-mode');
  }

  scheduleReportNoteAreaScroll();
}

function hideReportNoteArea(){
  reportNoteArea.classList.remove('show');

  if(inputModeScrollTimer){
    clearTimeout(inputModeScrollTimer);
  }

  if(inputModeSecondScrollTimer){
    clearTimeout(inputModeSecondScrollTimer);
  }
}

function isNoteRequiredStatus(status){
  return status==='🔥 機會' ||
         status==='📌 追蹤' ||
         status==='⚠️ 異常';
}

function submitReport(){
  if(isSubmittingReport){
    return;
  }

  if(!currentCustomer){
    return;
  }

  if(!selectedStatus){
    alert('請先選擇狀態');
    return;
  }

  const note=document.getElementById('reportNote').value.trim();

  if(isNoteRequiredStatus(selectedStatus) && !note){
    alert('這個狀態需要補一句重點，方便下次追蹤。');
    showReportNoteArea();
    reportNote.focus();
    return;
  }

  if(note.length>300){
    alert('備註最多 300 字');
    return;
  }

  setReportButtonSubmitting(true);

  const payload={
    customerCode:currentCustomer.customerCode||'',
    customerName:currentCustomer.customerName||'',
    owner:currentCustomer.owner||'',
    region:currentCustomer.region||'',
    status:selectedStatus,
    note:note
  };

  if(!isWriteApiConfigured()){
    saveReportOffline(note);
    alert('離線暫存，未寫入');
    resetReportButton();
    return;
  }

  jsonp({
    action:'saveReport',
    token:API_TOKEN,
    payload:JSON.stringify(payload)
  }).then(function(){
    updateCurrentCustomerAfterReport(note,'剛剛');
    renderDetail();
    applySearch();
    setReportButtonSaved();
    alert('回報已寫入');
  }).catch(function(err){
    alert('回報失敗：'+err.message);
    resetReportButton();
  });
}

function setReportButtonSubmitting(isSubmitting){
  const btn=document.getElementById('sendReportBtn');

  isSubmittingReport=isSubmitting;

  if(!btn){
    return;
  }

  btn.disabled=isSubmitting;
  btn.innerText=isSubmitting ? '送出中...' : '送出回報';
}

function setReportButtonSaved(){
  const btn=document.getElementById('sendReportBtn');

  isSubmittingReport=false;

  if(!btn){
    return;
  }

  btn.disabled=true;
  btn.innerText='已寫入';
}

function resetReportButton(){
  setReportButtonSubmitting(false);
}

function isWriteApiConfigured(){
  return API_BASE &&
         API_BASE !== '請貼上AppsScriptExec網址' &&
         API_TOKEN &&
         API_TOKEN !== '請填入和 Apps Script 一樣的 token';
}

function saveReportOffline(note){
  updateCurrentCustomerAfterReport(note,'離線暫存');
  renderDetail();
  applySearch();
}

function updateCurrentCustomerAfterReport(note,timeText){
  currentCustomer.lastStatus=selectedStatus;
  currentCustomer.lastVisit=timeText;
  currentCustomer.lastNote=note;

  if(!Array.isArray(currentCustomer.history)){
    currentCustomer.history=[];
  }

  currentCustomer.history.unshift({
    time:timeText,
    status:selectedStatus,
    note:note
  });
}

function togglePhonePanel(){
  const p=document.getElementById('phonePanel');

  if(p.style.display==='block'){
    p.style.display='none';
    return;
  }

  const phones=normalizePhones(currentCustomer.phone);

  if(!phones.length){
    p.innerHTML='沒有電話';
    p.style.display='block';
    return;
  }

  p.innerHTML=phones.map(function(phone){
    return `<a class="phone-link" href="tel:${phone}">${escapeHtml(phone)}</a>`;
  }).join('');

  p.style.display='block';
}

function normalizePhones(phoneText){
  const seen={};

  return String(phoneText||'')
    .split(/[\/、,，;；\s　]+/)
    .map(function(part){
      return part.replace(/[^0-9+*#]/g,'');
    })
    .filter(function(phone){
      const digitCount=phone.replace(/\D/g,'').length;

      if(digitCount<5 || seen[phone]){
        return false;
      }

      seen[phone]=true;
      return true;
    });
}

function toggleHistoryPanel(){
  const p=document.getElementById('historyPanel');

  if(p.style.display==='block'){
    p.style.display='none';
    return;
  }

  if(!currentCustomer){
    return;
  }

  p.innerHTML='載入中...';
  p.style.display='block';

  jsonp({
    action:'getCustomerHistory',
    customerName:currentCustomer.customerName
  }).then(function(data){
    currentCustomer.history=Array.isArray(data) ? data : [];
    renderHistoryPanel(p,currentCustomer.history);
  }).catch(function(err){
    renderHistoryPanel(p,currentCustomer.history||[],err);
  });
}

function renderHistoryPanel(panel,history,err){
  panel.innerHTML=history.map(function(h){
    return `
      <div class="hist-item">
        <div class="hist-time">${escapeHtml(h.time)}</div>
        <b>${escapeHtml(h.status)}</b><br>
        ${escapeHtml(h.note||'')}
      </div>
    `;
  }).join('');

  if(!history.length){
    panel.innerHTML='沒有歷史';
  }

  if(err){
    panel.innerHTML=
      '<div class="hist-item" style="color:#c62828;font-weight:900;">歷史載入失敗：'+
      escapeHtml(err.message)+
      '</div>'+
      (history.length ? panel.innerHTML : '<div class="hist-item">沒有離線歷史</div>');
  }
}

function openMap(){
  if(!currentCustomer){
    return;
  }

  const q=currentCustomer.address||currentCustomer.customerName;

  window.open(
    'https://www.google.com/maps/search/?api=1&query='+
    encodeURIComponent(q)
  );
}

function getSearchText(c){
  return [
    c.customerCode,
    c.customerName,
    c.region,
    c.owner,
    c.phone,
    c.address,
    c.lastStatus,
    c.lastNote
  ].join(' ');
}

function escapeHtml(text){
  return String(text||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}
