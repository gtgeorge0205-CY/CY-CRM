<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>新晴揚 BOSS 戰情中心</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
  <meta name="apple-mobile-web-app-title" content="新晴揚Boss">
  <meta name="theme-color" content="#05070a">
  <style>
    :root{
      --bg:#05070a;
      --bg-2:#0a0f14;
      --panel:#111820;
      --panel-2:#151e27;
      --line:#263340;
      --line-soft:rgba(170,184,197,.16);
      --text:#f5f7fa;
      --muted:#94a3b8;
      --silver:#d8dee6;
      --teal:#00e5c0;
      --teal-soft:rgba(0,229,192,.14);
      --yellow:#facc15;
      --red:#f87171;
      --shadow:0 22px 48px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{margin:0;width:100%;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
    body{
      overflow-x:hidden;
      background:
        linear-gradient(135deg,rgba(0,229,192,.08),transparent 28%),
        repeating-linear-gradient(120deg,rgba(255,255,255,.035) 0,rgba(255,255,255,.035) 1px,transparent 1px,transparent 18px),
        radial-gradient(circle at 75% 0%,rgba(148,163,184,.12),transparent 34%),
        var(--bg);
    }
    button,input{font:inherit}
    button{cursor:pointer}

    .shell{width:100%;min-height:100vh;padding:12px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
    .topbar{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(0,229,192,.24);
      border-radius:8px;
      background:linear-gradient(135deg,#0c1117,#111923 62%,#08110f);
      box-shadow:var(--shadow);
      padding:14px 16px;
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:space-between;
    }
    .topbar:before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,rgba(0,229,192,.2),transparent 22%,transparent 72%,rgba(216,222,230,.08));
      pointer-events:none;
    }
    .topbar-content,.refresh{position:relative;z-index:1}
    .eyebrow{font-size:12px;font-weight:900;color:var(--teal);text-transform:uppercase;letter-spacing:0;margin-bottom:5px}
    .title{font-size:23px;font-weight:900;line-height:1.12;color:#fff}
    .subtitle{font-size:12px;color:var(--silver);margin-top:5px}
    .sub{font-size:12px;color:var(--muted);margin-top:6px}
    .refresh{
      border:1px solid rgba(0,229,192,.45);
      background:rgba(0,229,192,.1);
      color:#eafffb;
      border-radius:8px;
      min-height:44px;
      padding:9px 12px;
      font-weight:900;
      white-space:nowrap;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
    }

    .section{margin-top:14px}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:8px}
    .section-title{font-size:14px;font-weight:900;margin:0;color:#e8edf3;text-transform:uppercase}
    .section-kicker{font-size:12px;color:var(--teal);font-weight:900;text-transform:uppercase}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
    .metric,.panel,.list-card,.search-box,.sector-card{
      background:linear-gradient(180deg,var(--panel),#0d131a);
      border:1px solid var(--line);
      border-radius:8px;
      box-shadow:0 12px 28px rgba(0,0,0,.24);
    }
    .metric{
      min-height:102px;
      padding:12px;
      position:relative;
      overflow:hidden;
    }
    .metric:after{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      bottom:10px;
      height:2px;
      background:linear-gradient(90deg,var(--teal),transparent);
      opacity:.72;
    }
    .metric.warning{border-color:rgba(250,204,21,.55);background:linear-gradient(180deg,#1d1a10,#111820)}
    .metric.warning:after{background:linear-gradient(90deg,var(--yellow),transparent)}
    .metric-label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase}
    .metric-value{display:block;min-height:40px;font-size:42px;font-weight:950;color:#fff;line-height:.95;margin-top:8px;text-shadow:0 0 16px rgba(0,229,192,.14)}
    .metric-note{font-size:12px;color:var(--silver);margin-top:6px}
    .panel{padding:12px}
    .split{display:grid;grid-template-columns:1fr;gap:10px}
    .sector-grid{display:grid;grid-template-columns:1fr;gap:9px}
    .sector-card{padding:12px;border-color:rgba(0,229,192,.18)}
    .sector-code{font-size:11px;color:var(--teal);font-weight:900;text-transform:uppercase}
    .sector-name{font-size:18px;font-weight:900;margin-top:3px}
    .sector-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px}
    .sector-stat{border:1px solid var(--line-soft);border-radius:8px;padding:8px;background:rgba(255,255,255,.025)}
    .sector-stat strong{display:block;font-size:19px;color:#fff}
    .sector-stat span{display:block;font-size:11px;color:var(--muted);margin-top:3px}
    .list-card{padding:11px;margin-top:8px}
    .list-card.alert{border-color:rgba(250,204,21,.36);background:linear-gradient(180deg,#1d1a10,#101820)}
    .card-name{font-weight:900;margin-bottom:7px;color:#fff}
    .card-meta{font-size:13px;color:var(--muted);line-height:1.65;word-break:break-word}
    .card-meta b{color:var(--silver)}
    .alert-badge{display:inline-block;margin-bottom:8px;border:1px solid rgba(250,204,21,.4);border-radius:8px;background:rgba(250,204,21,.1);color:#fde68a;padding:6px 8px;font-size:12px;font-weight:900}
    .alert-caption{color:#fde68a;font-size:12px;margin-top:3px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
    .action{border:0;border-radius:8px;min-height:44px;padding:10px 12px;font-weight:900;text-decoration:none;display:inline-flex;align-items:center}
    .action-secondary{background:var(--teal-soft);color:#cffff7;border:1px solid rgba(0,229,192,.32)}
    .action-danger{background:rgba(248,113,113,.12);color:#fecaca;border:1px solid rgba(248,113,113,.34)}
    .empty,.error,.loading{
      background:rgba(17,24,32,.72);
      border:1px dashed rgba(148,163,184,.3);
      border-radius:8px;
      padding:12px;
      color:var(--muted);
      line-height:1.6;
    }
    .error{border-color:rgba(248,113,113,.5);color:#fecaca;background:rgba(127,29,29,.18)}
    .loading{border-color:rgba(0,229,192,.32);color:#d9fffa}
    .status-chip-wrap{display:flex;gap:8px;flex-wrap:wrap}
    .status-chip{border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:8px;padding:9px 10px;color:var(--silver);font-size:13px}
    .status-chip strong{color:#fff;margin-left:4px}
    .status-chip.hot{border-color:rgba(0,229,192,.34);background:var(--teal-soft)}
    .status-chip.warn{border-color:rgba(250,204,21,.34);background:rgba(250,204,21,.09)}
    .sales-summary{display:grid;gap:10px}
    .sales-updated{font-size:13px;color:var(--silver);margin-bottom:10px}
    .sales-status-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .sales-chip{border:1px solid var(--line-soft);border-radius:8px;background:rgba(255,255,255,.028);padding:10px;min-height:86px}
    .sales-chip-name{font-size:12px;color:var(--teal);font-weight:900}
    .sales-chip-count{font-size:22px;font-weight:950;color:#fff;margin-top:5px}
    .sales-chip-meta{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
    .analysis-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:10px}
    .analysis-panel{border:1px solid var(--line-soft);border-radius:8px;background:rgba(7,12,18,.45);padding:10px;min-width:0}
    .analysis-title{font-size:13px;font-weight:900;color:#fff;margin:0 0 8px}
    .analysis-list{display:grid;gap:7px}
    .analysis-item{border-top:1px solid var(--line-soft);padding-top:8px;font-size:13px;color:var(--silver);line-height:1.55}
    .analysis-item:first-child{border-top:0;padding-top:0}
    .analysis-item strong{color:#fff}
    .analysis-tag{display:inline-block;border:1px solid rgba(0,229,192,.28);background:rgba(0,229,192,.1);border-radius:8px;padding:2px 6px;color:#cffff7;font-size:11px;font-weight:900;margin-right:5px}
    .analysis-rank{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:8px;background:var(--teal-soft);color:#dffff9;font-weight:900;margin-right:7px}
    .action-signal-wrap{display:grid;gap:8px}
    .action-signal-card{border:1px solid var(--line-soft);border-radius:8px;background:rgba(255,255,255,.028);padding:11px;line-height:1.55}
    .action-signal-card.priority-a{border-color:rgba(0,229,192,.5);background:linear-gradient(180deg,rgba(0,229,192,.12),rgba(17,24,32,.76))}
    .action-signal-card.priority-b{border-color:rgba(250,204,21,.34);background:linear-gradient(180deg,rgba(250,204,21,.08),rgba(17,24,32,.72))}
    .action-signal-card.priority-c{border-color:rgba(148,163,184,.22)}
    .signal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
    .signal-title{font-size:15px;font-weight:950;color:#fff}
    .signal-badge{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:28px;border-radius:8px;border:1px solid rgba(0,229,192,.34);background:var(--teal-soft);color:#dffff9;font-weight:950}
    .priority-b .signal-badge{border-color:rgba(250,204,21,.34);background:rgba(250,204,21,.1);color:#fde68a}
    .priority-c .signal-badge{border-color:rgba(148,163,184,.24);background:rgba(148,163,184,.08);color:#d8dee6}
    .signal-meta{font-size:12px;color:var(--muted);margin-bottom:7px}
    .signal-text{font-size:13px;color:var(--silver);margin-top:5px}
    .signal-text b{color:#fff}
    .signal-numbers{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:var(--muted)}
    .signal-numbers span{border:1px solid var(--line-soft);border-radius:8px;padding:5px 7px;background:rgba(255,255,255,.025)}
    .report-head{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;margin-bottom:10px}
    .report-count{font-size:42px;font-weight:950;color:#fff;line-height:.95;text-shadow:0 0 16px rgba(0,229,192,.14)}
    .report-window{font-size:12px;color:var(--muted);line-height:1.5}
    .owner-counts{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px}
    .owner-pill{border:1px solid rgba(0,229,192,.22);background:rgba(0,229,192,.08);border-radius:8px;padding:7px 9px;color:#dffff9;font-size:12px;font-weight:900}
    .report-card{border-top:1px solid var(--line-soft);padding:10px 0;line-height:1.58}
    .report-card:first-child{border-top:0}
    .report-title{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;color:#fff;font-weight:900}
    .report-type{border:1px solid rgba(0,229,192,.25);background:rgba(0,229,192,.08);border-radius:8px;padding:2px 6px;color:#dffff9;font-size:11px;white-space:nowrap}
    .report-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .report-content{font-size:13px;color:var(--silver);margin-top:6px;white-space:pre-wrap;word-break:break-word}
    .toggle-btn{width:100%;border:1px solid rgba(0,229,192,.28);background:rgba(0,229,192,.08);color:#dffff9;border-radius:8px;min-height:44px;padding:9px 12px;font-weight:900;margin-top:10px}
    .search-box{padding:12px}
    .search-input{
      width:100%;
      border:1px solid rgba(0,229,192,.28);
      border-radius:8px;
      min-height:44px;
      padding:12px;
      background:#080c11;
      color:#fff;
      outline:none;
    }
    .search-input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,229,192,.11)}
    .search-results{margin-top:10px}
    .result-btn{width:100%;min-height:44px;text-align:left;border:0;border-top:1px solid var(--line-soft);background:transparent;color:#fff;padding:10px 2px}
    .result-btn:first-child{border-top:0}
    .detail{margin-top:10px;background:#0b1118;border:1px solid var(--line);border-radius:8px;padding:12px}
    .muted{color:var(--muted)}

    @media (min-width:769px){
      .shell{padding:18px}
      .grid{grid-template-columns:repeat(4,minmax(0,1fr))}
      .split{grid-template-columns:1fr 1fr}
      .sector-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .sales-summary{grid-template-columns:1fr}
      .title{font-size:28px}
      .topbar{padding:16px 18px}
    }

    @media (max-width:768px){
      .shell{padding:10px;padding-bottom:calc(22px + env(safe-area-inset-bottom))}
      .topbar{padding:12px;gap:10px;align-items:flex-start}
      .topbar-content{min-width:0}
      .title{font-size:21px;line-height:1.16;word-break:keep-all}
      .subtitle{font-size:12px;line-height:1.35}
      .refresh{min-height:44px;padding:8px 10px}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .metric{min-height:106px;padding:11px}
      .metric-value{font-size:38px;min-height:38px}
      .sector-grid,.split,.analysis-grid{grid-template-columns:1fr}
      .sales-status-grid{grid-template-columns:1fr 1fr}
      .panel,.sector-card,.search-box{padding:11px}
      .list-card{padding:11px}
      .section{margin-top:13px}
    }

    @media (max-width:420px){
      .topbar{flex-direction:column}
      .refresh{width:100%}
      .grid{grid-template-columns:1fr 1fr}
      .sales-status-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="topbar-content">
        <div class="eyebrow">即時營運看板</div>
        <div class="title">新晴揚 BOSS 戰情中心</div>
        <div class="subtitle">即時營運看板｜營運、異常、銷貨分析與近兩日回報</div>
        <div class="sub">最後更新：<span id="generatedAt">尚未載入</span></div>
      </div>
      <button class="refresh" onclick="loadDashboard()">重新整理</button>
    </header>

    <section class="section" id="messageArea">
      <div class="loading">載入 Boss 戰情資料中...</div>
    </section>

    <section class="section" id="dashboard" style="display:none">
      <div class="section-head">
        <div>
          <div class="section-kicker">今日營運</div>
          <h2 class="section-title">今日營運提醒</h2>
        </div>
      </div>
      <div class="grid" id="metricGrid"></div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">待處理異常</div>
          <h2 class="section-title">待處理異常</h2>
        </div>
      </div>
      <div class="split">
        <div class="panel">
          <h3 class="section-title">待補回報</h3>
          <div id="pendingDrafts"></div>
        </div>
        <div class="panel">
          <h3 class="section-title">待指定客戶</h3>
          <div id="unmatchedDrafts"></div>
        </div>
      </div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">銷貨分析</div>
          <h2 class="section-title">銷貨分析摘要</h2>
        </div>
      </div>
      <div class="panel" id="salesSummary"></div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">業務分區</div>
          <h2 class="section-title">業務分區狀況</h2>
        </div>
      </div>
      <div class="sector-grid" id="ownerSummary"></div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">業務回報追蹤</div>
          <h2 class="section-title">近兩日回報</h2>
        </div>
      </div>
      <div class="panel" id="todayReports"></div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">客戶狀態</div>
          <h2 class="section-title">客戶狀態摘要</h2>
        </div>
      </div>
      <div class="panel" id="customerStatusSummary"></div>

      <div class="section-head section">
        <div>
          <div class="section-kicker">客戶快速搜尋</div>
          <h2 class="section-title">客戶快速搜尋</h2>
        </div>
      </div>
      <div class="search-box">
        <input class="search-input" id="customerSearch" placeholder="搜尋客戶名稱、電話、地址">
        <div class="search-results" id="searchResults"></div>
        <div id="customerDetail"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE='https://script.google.com/macros/s/AKfycbyIFfeLQBG_7iBhN4gNA5QWXa1aLHczrlxWF_24gcanlL_XOvYo_nudFFSaLzJFJsnSrQ/exec';
    const API_TOKEN='CYCRM_2026_write_test';
    const JSONP_TIMEOUT_MS=20000;
    let dashboardData=null;
    let customers=[];
    let reportExpanded=false;
    let actionSignalsExpanded=false;

    document.getElementById('customerSearch').addEventListener('input',renderCustomerSearch);
    loadDashboard();
    loadCustomers();

    function loadDashboard(){
      console.log('boss dashboard loading');
      setMessage('<div class="loading">載入 Boss 戰情資料中...</div>');
      document.getElementById('dashboard').style.display='none';

      jsonp({
        action:'getBossDashboard',
        token:API_TOKEN
      }).then(function(data){
        console.log('boss dashboard loaded');
        dashboardData=data||{};
        renderDashboard(dashboardData);
      }).catch(function(err){
        console.log('boss dashboard error',err.message);
        setMessage('<div class="error">Boss 戰情資料載入失敗<br>'+escapeHtml(err.message)+'<br><button class="action action-secondary" style="margin-top:10px" onclick="loadDashboard()">重試</button></div>');
      });
    }

    function loadCustomers(){
      jsonp({
        action:'getCustomers',
        mode:'boss'
      }).then(function(data){
        customers=Array.isArray(data)?data:[];
        renderCustomerSearch();
      }).catch(function(err){
        document.getElementById('searchResults').innerHTML='<div class="empty">客戶資料載入失敗：'+escapeHtml(err.message)+'</div>';
      });
    }

    function renderDashboard(data){
      document.getElementById('dashboard').style.display='block';
      setMessage('');
      document.getElementById('generatedAt').textContent=data.generatedAt||'';
      renderMetrics(data.operationSummary||{});
      renderOwnerSummary(data.ownerSummary||[]);
      renderPendingDrafts(data.pendingDrafts||[]);
      renderUnmatchedDrafts(data.unmatchedDrafts||[]);
      renderSalesSummary(data.salesSummary||{});
      renderReportSummary(data.reportSummary||{});
      renderCustomerStatus(data.customerStatusSummary||[],data.customerStatusExtra||{});
    }

    function renderMetrics(summary){
      const items=[
        {label:'今日回報',value:toMetricNumber(summary.todayReportCount),note:'正式業務回報'},
        {label:'待補回報',value:toMetricNumber(summary.pendingDraftCount),note:'需要業務補內容'},
        {label:'待指定客戶',value:toMetricNumber(summary.unmatchedDraftCount),note:'需管理端處理',warning:toMetricNumber(summary.unmatchedDraftCount)>0},
        {label:'已確認座標',value:toMetricNumber(summary.coordinateConfirmedCount),note:'可用於快速回報'}
      ];

      document.getElementById('metricGrid').innerHTML=items.map(function(item){
        return '<div class="metric '+(item.warning?'warning':'')+'">'+
          '<div class="metric-label">'+escapeHtml(item.label)+'</div>'+
          '<div class="metric-value">'+escapeHtml(formatMetricValue(item.value))+'</div>'+
          '<div class="metric-note">'+escapeHtml(item.note)+'</div>'+
        '</div>';
      }).join('');
    }

    function renderOwnerSummary(rows){
      if(!rows.length){
        document.getElementById('ownerSummary').innerHTML='<div class="empty">目前沒有分區資料。</div>';
        return;
      }

      const codeMap={'溪南':'溪南區','溪北':'溪北區','其他':'其他'};
      document.getElementById('ownerSummary').innerHTML=rows.map(function(row){
        return '<div class="sector-card">'+
          '<div class="sector-code">'+escapeHtml(codeMap[row.ownerName]||'OTHER SECTOR')+'</div>'+
          '<div class="sector-name">'+escapeHtml(row.ownerName||'其他')+'</div>'+
          '<div class="sector-stats">'+
            '<div class="sector-stat"><strong>'+num(row.todayReportCount)+'</strong><span>今日回報</span></div>'+
            '<div class="sector-stat"><strong>'+num(row.pendingDraftCount)+'</strong><span>待補</span></div>'+
            '<div class="sector-stat"><strong>'+num(row.unmatchedDraftCount)+'</strong><span>待指定</span></div>'+
          '</div>'+
        '</div>';
      }).join('');
    }

    function renderPendingDrafts(rows){
      document.getElementById('pendingDrafts').innerHTML=rows.slice(0,10).map(function(row){
        return '<div class="list-card">'+
          '<div class="card-name">'+escapeHtml(row.customerName||'未指定客戶')+'</div>'+
          '<div class="card-meta"><b>Sector</b> '+escapeHtml(row.mode||'')+' / '+escapeHtml(row.salesName||'')+'<br>'+
          '<b>建立時間</b> '+escapeHtml(row.createdAt||'')+'<br>'+
          '<b>GPS 精準度</b> 約 '+escapeHtml(formatAccuracy(row.accuracy))+'<br>'+
          '<b>備註</b> '+escapeHtml(row.note||'無')+'</div>'+
        '</div>';
      }).join('') || '<div class="empty">目前沒有待補回報。Pit lane clear.</div>';

    function renderUnmatchedDrafts(rows){
      document.getElementById('unmatchedDrafts').innerHTML=rows.slice(0,10).map(function(row){

          '<div class="alert-badge">⚠ 需管理端指定客戶</div>'+
          '<div class="card-name">'+escapeHtml(row.customerName||'找不到顧客')+'</div>'+
          '<div class="alert-caption">快速回報找不到對應客戶</div>'+
          '<div class="card-meta"><b>Sector</b> '+escapeHtml(row.mode||'')+' / '+escapeHtml(row.salesName||'')+'<br>'+
          '<b>建立時間</b> '+escapeHtml(row.createdAt||'')+'<br>'+
          '<b>GPS 精準度</b> 約 '+escapeHtml(formatAccuracy(row.accuracy))+'<br>'+
          '<b>備註</b> '+escapeHtml(row.note||'無')+'</div>'+
          '<div class="actions">'+
          (row.googleMapsUrl?'<a class="action action-secondary" target="_blank" rel="noopener" href="'+escapeAttr(row.googleMapsUrl)+'">查看位置</a>':'')+

          '</div>'+
        '</div>';
      }).join('') || '<div class="empty">目前沒有待指定客戶。</div>';

    function renderReportSummary(summary){
      const target=document.getElementById('todayReports');

      try{
        summary=summary||{};
        const reports=Array.isArray(summary.reports)?summary.reports:[];
        const byOwner=Array.isArray(summary.byOwner)?summary.byOwner:[];

        if(summary.message && !reports.length){
          console.log('boss recent reports missing',summary.message);
          target.innerHTML='<div class="empty">暫時無法讀取業務回報。</div>';
          return;
        }

        console.log('boss recent reports loaded',reports.length);
        const shown=reportExpanded?reports:reports.slice(0,10);
        const toggle=reports.length>10
          ? '<button class="toggle-btn" onclick="toggleReportDetails()">'+(reportExpanded?'收合':'顯示更多')+'</button>'
          : '';

        target.innerHTML=
          '<div class="report-head">'+
            '<div class="report-count">'+num(summary.totalCount)+'</div>'+
            '<div>'+
              '<div class="card-name">'+escapeHtml(summary.rangeLabel||'近48小時回報')+'</div>'+
              '<div class="report-window">'+escapeHtml(summary.startTime||'')+' → '+escapeHtml(summary.endTime||'')+'</div>'+
            '</div>'+
          '</div>'+
          renderOwnerReportCounts(byOwner)+
          (reports.length
            ? '<div>'+shown.map(renderReportCard).join('')+'</div>'+toggle
            : '<div class="empty">近兩日尚無業務回報。</div>');
      }catch(err){
        console.log('boss recent report detail render error',err.message);
        target.innerHTML='<div class="error">業務回報追蹤渲染失敗：'+escapeHtml(err.message)+'</div>';
      }

    function renderOwnerReportCounts(rows){
      if(!rows.length){

      }

      return '<div class="owner-counts">'+rows.map(function(row){
        return '<span class="owner-pill">'+escapeHtml(row.owner||'未指定')+' '+num(row.count)+'</span>';
      }).join('')+'</div>';
    }

    function renderReportCard(row){
      const mapsUrl=row.googleMapsUrl || (row.lat&&row.lng?'https://www.google.com/maps?q='+encodeURIComponent(row.lat+','+row.lng):'');

        '<div class="report-title">'+
          '<span>'+escapeHtml(row.customerName||'未命名客戶')+'</span>'+
          '<span class="report-type">'+escapeHtml(row.reportType||row.status||'回報')+'</span>'+
        '</div>'+
        '<div class="report-meta">'+escapeHtml(row.timestamp||row.date||'')+'｜'+escapeHtml(row.owner||'未指定')+'</div>'+
        '<div class="report-content">'+escapeHtml(row.content||row.note||'無回報內容')+'</div>'+
        (row.status?'<div class="report-meta">狀態：'+escapeHtml(row.status)+'</div>':'')+
        (mapsUrl?'<div class="actions"><a class="action action-secondary" target="_blank" rel="noopener" href="'+escapeAttr(mapsUrl)+'">查看位置</a></div>':'')+
      '</div>';

    function toggleReportDetails(){
      reportExpanded=!reportExpanded;
      renderReportSummary((dashboardData&&dashboardData.reportSummary)||{});
    }

    function renderCustomerStatus(rows,extra){
      const html='<div class="status-chip-wrap">'+
        rows.map(function(row){
          const status=row.status||'未分類';
          const chipClass=status==='重點經營'?'hot':(status==='停止經營'||status==='暫緩經營'?'warn':'');
          return '<div class="status-chip '+chipClass+'">'+escapeHtml(status)+' <strong>'+num(row.count)+'</strong></div>';
        }).join('')+

        '<div class="status-chip warn">隱藏首頁 <strong>'+num(extra.hiddenHomeCount)+'</strong></div>'+

    function renderSalesSummary(summary){
      const target=document.getElementById('salesSummary');

      try{
        summary=summary||{};
        const statusStats=Array.isArray(summary.statusStats)?summary.statusStats:[];
        const alerts=Array.isArray(summary.alerts)?summary.alerts:[];
        const topProfitCustomers=Array.isArray(summary.topProfitCustomers)?summary.topProfitCustomers:[];
        const decliningCustomers=Array.isArray(summary.decliningCustomers)?summary.decliningCustomers:[];
        const actionSignals=Array.isArray(summary.actionSignals)?summary.actionSignals:[];

        if(summary.message && !statusStats.length && !alerts.length && !topProfitCustomers.length && !decliningCustomers.length && !actionSignals.length){
          console.log('boss sales summary missing',summary.message);
          target.innerHTML='<div class="empty">尚未讀取到銷貨分析摘要</div>';
          return;
        }

        console.log('boss sales summary loaded');
        if(actionSignals.length){
          console.log('boss action signals loaded',actionSignals.length);
        }else{
          console.log('boss action signals missing');
        }

        target.innerHTML=
          '<div class="sales-updated">銷貨分析更新：'+escapeHtml(summary.updatedAt||'尚未讀取到銷貨分析摘要')+'</div>'+
          '<div class="sales-summary">'+
            '<div class="analysis-panel">'+
              '<h3 class="analysis-title">Boss行動清單</h3>'+
              renderActionSignals(actionSignals)+
            '</div>'+
            '<div class="analysis-panel">'+
              '<h3 class="analysis-title">經營狀態摘要</h3>'+
              renderSalesStatusStats(statusStats)+
            '</div>'+
            '<div class="analysis-grid">'+
              '<div class="analysis-panel">'+
                '<h3 class="analysis-title">毛利前10</h3>'+
                renderTopProfitCustomers(topProfitCustomers.slice(0,10))+
              '</div>'+
              '<div class="analysis-panel">'+
                '<h3 class="analysis-title">觀察中 / 下滑客戶</h3>'+
                renderDecliningCustomers(decliningCustomers.slice(0,10))+
              '</div>'+
            '</div>'+
          '</div>';
      }catch(err){
        console.log('boss sales summary render error',err.message);
        target.innerHTML='<div class="error">銷貨分析摘要渲染失敗：'+escapeHtml(err.message)+'</div>';
      }

    function renderActionSignals(rows){
      if(!rows.length){
        return '<div class="empty">尚未產生 Boss行動清單，請先到銷貨分析執行一鍵更新全部。</div>';
      }

      const shown=actionSignalsExpanded?rows:rows.slice(0,10);
      const toggle=rows.length>10
        ? '<button class="toggle-btn" onclick="toggleActionSignals()">'+(actionSignalsExpanded?'收合':'顯示更多')+'</button>'
        : '';

      return '<div class="action-signal-wrap">'+shown.map(function(row){
        const priority=String(row.priority||'C').toUpperCase();
        const priorityClass=priority==='A'?'priority-a':(priority==='B'?'priority-b':'priority-c');

        return '<div class="action-signal-card '+priorityClass+'">'+
          '<div class="signal-head">'+
            '<div>'+
              '<div class="signal-title">'+escapeHtml(row.actionType||'待處理行動')+'</div>'+
              '<div class="signal-meta">'+escapeHtml(row.customerName||'未命名客戶')+'｜'+escapeHtml(row.owner||'未指定')+'｜'+escapeHtml(row.customerStatus||'未分類')+'</div>'+
            '</div>'+
            '<span class="signal-badge">'+escapeHtml(priority)+'</span>'+
          '</div>'+
          '<div class="signal-text"><b>問題</b> '+escapeHtml(row.problemSummary||'未填寫')+'</div>'+
          '<div class="signal-text"><b>建議</b> '+escapeHtml(row.suggestedAction||'未填寫')+'</div>'+
          '<div class="signal-text"><b>依據</b> '+escapeHtml(row.basis||'未填寫')+'</div>'+
          '<div class="signal-numbers">'+
            '<span>總毛利 '+formatMoney(row.totalGrossProfit)+'</span>'+
            '<span>近90天 '+formatMoney(row.grossProfit90d)+'</span>'+
            '<span>最後交易 '+escapeHtml(row.lastTradeDate||'無')+'</span>'+
          '</div>'+
        '</div>';
      }).join('')+toggle+'</div>';
    }

    function toggleActionSignals(){
      actionSignalsExpanded=!actionSignalsExpanded;
      renderSalesSummary((dashboardData&&dashboardData.salesSummary)||{});
    }

    function renderSalesStatusStats(rows){
      if(!rows.length){
        return '<div class="empty">尚未讀取到經營狀態統計。</div>';
      }

      const order=['重點經營','觀察中','待開發','穩定維護','暫緩經營','停止經營'];
      const map={};
      rows.forEach(function(row){
        map[row.status]=row;

      return '<div class="sales-status-grid">'+order.map(function(status){
        const row=map[status]||{status:status,customerCount:0,totalGrossProfit:0,grossProfit90d:0};
        return '<div class="sales-chip">'+
          '<div class="sales-chip-name">'+escapeHtml(status)+'</div>'+
          '<div class="sales-chip-count">'+num(row.customerCount)+'</div>'+
          '<div class="sales-chip-meta">總毛利 '+formatMoney(row.totalGrossProfit)+'<br>近90天 '+formatMoney(row.grossProfit90d)+'</div>'+
        '</div>';
      }).join('')+'</div>';
    }

    function renderSalesAlerts(rows){

        return '<div class="empty">目前沒有重點警示。</div>';
      }

      return '<div class="analysis-list">'+rows.map(function(row){

          '<span class="analysis-tag">'+escapeHtml(row.alertType||'警示')+'</span>'+
          '<strong>'+escapeHtml(row.customerName||'未命名客戶')+'</strong>｜'+escapeHtml(row.customerStatus||'未分類')+'<br>'+
          '近90天毛利 '+formatMoney(row.grossProfit90d)+'｜最後交易 '+escapeHtml(row.lastTradeDate||'無')+'<br>'+
          '<span class="muted">'+escapeHtml(row.reason||'無建議理由')+'</span>'+

    function renderTopProfitCustomers(rows){

    function renderCustomerSearch(){
      const keyword=document.getElementById('customerSearch').value.trim().toLowerCase();
      const results=document.getElementById('searchResults');

      if(!keyword){
        results.innerHTML='<div class="empty">輸入關鍵字搜尋客戶。</div>';
        return;
      }

      const matched=customers.filter(function(c){
        return [
          c.customerCode,
          c.customerName,
          c.phone,
          c.address,

        return '<button class="result-btn" data-customer-index="'+index+'"><strong>'+escapeHtml(c.customerName||'')+'</strong><br><span class="muted">'+escapeHtml(c.phone||'無電話')+'｜'+escapeHtml(c.customerStatus||'未分類')+'</span></button>';
      }).join('') || '<div class="empty">找不到符合的客戶。</div>';

        '<b>客戶狀態</b> '+escapeHtml(c.customerStatus||'未分類')+'<br>'+
        '<b>首頁/拜訪處理</b> '+escapeHtml(c.visitPolicy||'正常')+'<br>'+
        '<b>最後拜訪</b> '+escapeHtml(c.lastVisit||'無紀錄')+'<br>'+
        '<b>最後狀況</b> '+escapeHtml(c.lastStatus||'無')+'</div>'+

    function voidUnmatchedDraft(draftId){
      if(!draftId){
        return;
      }

      if(!confirm('確定作廢這筆待指定客戶草稿？')){
        return;
      }

      const reason=prompt('請輸入作廢原因','Boss 作廢待指定客戶')||'Boss 作廢待指定客戶';

      jsonp({
        action:'voidVisitDraft',
        token:API_TOKEN,
        payload:JSON.stringify({
          draftId:draftId,
          reason:reason
        })
      }).then(function(){
        console.log('void unmatched draft success',draftId);
        loadDashboard();
      }).catch(function(err){
        console.log('void unmatched draft failed',err.message);
        alert('作廢失敗：'+err.message);
      });
    }

    function jsonp(params){
      return new Promise(function(resolve,reject){
        const callback='boss_jsonp_'+Date.now()+'_'+Math.floor(Math.random()*100000);
        const timer=setTimeout(function(){
          cleanup();
          reject(new Error('API 載入逾時'));
        },JSONP_TIMEOUT_MS);

        function cleanup(){
          clearTimeout(timer);
          delete window[callback];
          if(script.parentNode){
            script.parentNode.removeChild(script);
          }
        }

        params.callback=callback;
        window[callback]=function(payload){
          cleanup();

          if(!payload || payload.ok===false){
            reject(new Error(payload && payload.error ? payload.error : 'API 回傳失敗'));
            return;
          }

          resolve(payload.data);
        };

        const query=Object.keys(params).map(function(key){
          return encodeURIComponent(key)+'='+encodeURIComponent(params[key]);
        }).join('&');
        const script=document.createElement('script');

        script.onerror=function(){
          cleanup();
          reject(new Error('API 連線失敗'));
        };
        script.src=API_BASE+'?'+query;
        document.body.appendChild(script);
      });
    }

    function setMessage(html){
      document.getElementById('messageArea').innerHTML=html||'';
      document.getElementById('messageArea').style.display=html?'block':'none';
    }

    function formatAccuracy(value){
      const n=Number(value);
      return isFinite(n) ? Math.round(n)+' 公尺' : '未知';
    }

    function toMetricNumber(value){
      const n=Number(value);
      return isFinite(n) ? n : 0;
    }

    function formatMetricValue(value){
      const n=toMetricNumber(value);
      return String(n);
    }

    function num(value){
      const n=Number(value||0);
      return isFinite(n) ? n : 0;
    }

    function formatMoney(value){
      const n=Number(value||0);

      if(!isFinite(n)){
        return '0';
      }

      return Math.round(n).toLocaleString('zh-TW');
    }

    function formatPercent(value){
      const n=Number(value);

      if(!isFinite(n)){
        return '0.0%';
      }

      return (n*100).toFixed(1)+'%';
    }

    function escapeHtml(text){
      return String(text||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function escapeAttr(text){
      return escapeHtml(text);
    }
  </script>
